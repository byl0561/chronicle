services:
  chronicle:
    build: .
    image: chronicle
    container_name: chronicle
    ports:
      - "8000:8080"
    environment:
      # 可选访问密码，留空则不启用 Basic Auth
      APP_USERNAME: ${APP_USERNAME:-chronicle}
      APP_PASSWORD: ${APP_PASSWORD:-}
      # gunicorn 调优（可选）
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
    volumes:
      - chronicle-data:/app/data   # SQLite 文件 → /app/data/chronicle.db
    restart: unless-stopped

volumes:
  chronicle-data:
